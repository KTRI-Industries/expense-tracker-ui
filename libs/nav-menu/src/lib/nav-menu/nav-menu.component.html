<mat-toolbar class="sticky-toolbar mat-elevation-z6">
  <!-- md:hidden hides burger button on bigger screens-->
  <button
    mat-icon-button
    class="md:hidden"
    aria-label="Example icon-button with menu icon"
    (click)="sidenav.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <span data-cy="main-title"><a routerLink="/">Expense Tracker</a></span>
  <!-- hidden md:flex hides top menu on smaller screens -->
  <!-- grow  fills any available space   -->
  <!-- items-center aligns menu items vertically-->
  <div class="nav-flex-container" data-cy="top-menu">
    <ng-container *ngTemplateOutlet="menu"></ng-container>
  </div>
</mat-toolbar>

<mat-sidenav-container>
  <!-- fixedInViewPort seems to be needed to show the side menu above the main content. fixedTopGap moves the side menu bellow the top menu-->
  <mat-sidenav fixedInViewport="true" fixedTopGap="56" #sidenav>
    <!-- flex-col because in sidenav we want the menu elements to be the one above the other -->
    <mat-nav-list class="flex flex-col">
      <ng-container *ngTemplateOutlet="menu"></ng-container>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>

<ng-template #menu>
  @if (!isAuthenticated) {
    <!-- flex-auto works together with parent class 'grow' and pushes the rest of the elements to the right (like a spacer)-->
    <span class="flex-auto"></span>
    <button
      mat-icon-button
      matTooltip="Login"
      (click)="onLogin()"
      data-cy="login-button">
      <mat-icon>login</mat-icon>
    </button>
  } @else {
    @if (tenantId !== undefined) {
      <button
        mat-button
        routerLink="/transactions-page"
        (click)="sidenav.close()"
        data-cy="transactions-menu">
        Transactions
      </button>
      @if (isUserAccountOwner) {
        <button
          mat-button
          routerLink="/user-page/invite"
          (click)="sidenav.close()">
          Invite User
        </button>
      }
      @if (!!pendingAccountInvitations && pendingAccountInvitations > 0) {
        <button
          class="badge-low"
          mat-button
          [matBadge]="pendingAccountInvitations"
          routerLink="/user-page/tenants"
          (click)="sidenav.close()">
          Invitations
        </button>
      }
      <!-- flex-auto works together with parent class 'grow' and pushes the rest of the elements to the right (like a spacer)-->
      <span class="flex-auto"></span>
      @if (currentAccount) {
        <span class="px-2 mr-4 text-sm">
          Account in use:
          <mat-chip-listbox>
            <mat-chip highlighted color="accent">
              {{ currentAccount }}
            </mat-chip>
          </mat-chip-listbox>
        </span>
      }
      <!-- User avatar button — opens dropdown menu -->
      <button
        mat-icon-button
        [matMenuTriggerFor]="userMenu"
        aria-label="User menu"
        data-cy="user-menu-button">
        <span class="flex items-center justify-center w-8 h-8 rounded-full bg-blue-600 text-white text-xs font-medium leading-none">{{ initials }}</span>
      </button>

      <mat-menu #userMenu="matMenu" xPosition="before">
        <!-- Non-interactive header showing user identity -->
        <div class="px-4 py-2 pointer-events-none select-none">
          <div class="font-medium">{{ username }}</div>
          <div class="text-sm opacity-60">{{ email }}</div>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="/user-page" data-cy="profile-menu-item">
          <mat-icon>person</mat-icon>
          Profile
        </button>
        <button mat-menu-item (click)="onManageSecurity()" data-cy="security-menu-item">
          <mat-icon>key</mat-icon>
          Security
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="onLogout()" data-cy="logout-button">
          <mat-icon>logout</mat-icon>
          Sign out
        </button>
      </mat-menu>
    }
  }
</ng-template>
