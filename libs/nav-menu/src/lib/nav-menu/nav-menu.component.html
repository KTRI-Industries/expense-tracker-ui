<!-- h-full: makes the sidenav container fill the full viewport height so mat-sidenav-content
     becomes the scroll container. The toolbar inside it can then use sticky positioning. -->
<mat-sidenav-container class="h-full">
  <!-- fixedInViewPort seems to be needed to show the side menu above the main content. fixedTopGap moves the side menu bellow the top menu-->
  <mat-sidenav fixedInViewport="true" fixedTopGap="56" #sidenav>
    <!-- flex-col because in sidenav we want the menu elements to be the one above the other -->
    <mat-nav-list class="flex flex-col">
      <ng-container *ngTemplateOutlet="menu"></ng-container>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <!-- sticky top-0 z-[1]: sticks to the top of mat-sidenav-content's scroll context.
         The toolbar is inside mat-sidenav-content so sticky works correctly here — it pins
         within the same scroll container as the page content. -->
    <mat-toolbar class="sticky top-0 z-[100] mat-elevation-z6">
      <!-- md:hidden hides burger button on bigger screens-->
      <button
        mat-icon-button
        class="md:hidden"
        aria-label="Example icon-button with menu icon"
        (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span data-cy="main-title"><a routerLink="/">Expense Tracker</a></span>

      <div class="nav-flex-container" data-cy="top-menu">
        <ng-container *ngTemplateOutlet="menu"></ng-container>
      </div>
    </mat-toolbar>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>

<ng-template #menu>
  @if (!isAuthenticated) {
    <!-- flex-auto works together with parent class 'grow' and pushes the rest of the elements to the right (like a spacer)-->
    <span class="flex-auto"></span>
    <button
      mat-icon-button
      matTooltip="Login"
      aria-label="Login"
      (click)="onLogin()"
      data-cy="login-button">
      <mat-icon>login</mat-icon>
    </button>
  } @else {
    @if (tenantId !== undefined) {
      <button
        mat-button
        routerLink="/transactions-page"
        (click)="sidenav.close()"
        data-cy="transactions-menu">
        Transactions
      </button>
      @if (isUserAccountOwner) {
        <button
          mat-button
          routerLink="/user-page/invite"
          (click)="sidenav.close()">
          Invite User
        </button>
      }
      @if (!!pendingAccountInvitations && pendingAccountInvitations > 0) {
        <button
          mat-button
          routerLink="/user-page/tenants"
          (click)="sidenav.close()">
          Invitations
          <span class="nav-badge">{{ pendingAccountInvitations }}</span>
        </button>
      }
      <!-- flex-auto works together with parent class 'grow' and pushes the rest of the elements to the right (like a spacer)-->
      <span class="flex-auto"></span>
      @if (currentAccount) {
        <span class="px-2 mr-4 text-sm">
          Account in use:
          <mat-chip-listbox>
            <mat-chip highlighted color="accent">
              {{ currentAccount }}
            </mat-chip>
          </mat-chip-listbox>
        </span>
      }
      <a
        routerLink="/user-page"
        matTooltip="Go to User Page"
        class="hover:underline"
        data-cy="username-link"
        (click)="sidenav.close()">
        {{ username }}
      </a>
      <button
        mat-icon-button
        matTooltip="Logout"
        aria-label="Logout"
        (click)="onLogout()"
        data-cy="logout-button">
        <mat-icon>logout</mat-icon>
      </button>
    }
  }
</ng-template>
