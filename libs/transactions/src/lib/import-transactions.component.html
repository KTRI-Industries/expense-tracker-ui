<mat-card>
  <mat-card-header>
    <mat-card-title>Import Transactions</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <!-- form-container: limits form width to 50% on medium+ screens (see styles.css) -->
    <form class="form-container" [formGroup]="form">
      <formly-form
        [form]="form"
        [fields]="fields"
        [model]="model"
        [options]="options"></formly-form>
      <button
        mat-raised-button
        color="primary"
        (click)="onImport()"
        [disabled]="!form.valid"
        data-cy="import-transactions-button">
        Import
      </button>
    </form>
  </mat-card-content>
</mat-card>
