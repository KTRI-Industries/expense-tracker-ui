<!-- lg:flex lg:flex-wrap lg:items-center lg:space-x-4: on large screens, lays out the formly fields,
     Apply button, and date display in a single horizontal row with gaps between them.
     On smaller screens each item stacks vertically (default block flow). -->
<form
  [formGroup]="form"
  class="lg:flex lg:flex-wrap lg:items-center lg:space-x-4"
  data-cy="dashboard-filter-form">
  <formly-form [form]="form" [fields]="fields" [model]="model"></formly-form>
  @if (isCustomFilter()) {
    <!-- mt-4 adds top spacing when stacked vertically; lg:mt-0 removes it when in a row -->
    <a
      mat-button
      color="primary"
      class="mt-4 lg:mt-0"
      href="#"
      data-cy="dashboard-apply-filter-button"
      (click)="applyCustomFilter($event)">
      Apply
    </a>
  }
  <!-- Selected date range display: pushed to the right (lg:ml-4 lg:text-right) on large screens,
       stacked below with top spacing (mt-4) on small screens where lg:mt-0 doesn't apply -->
  <div class="text-sm text-gray-300 mt-4 lg:mt-0 lg:ml-4 lg:text-right">
    @if (model?.startDate) {
      <div>from: {{ model?.startDate?.format('DD/MM/YY') }}</div>
    }
    @if (model?.endDate) {
      <div>to: {{ model?.endDate?.format('DD/MM/YY') }}</div>
    }
  </div>
</form>
